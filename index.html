<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ied Mubarok 1447 H</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background:blue;
            color: #333;
            justify-content: center;
            min-height: 100vh;}
/* Header */
header {
   background-color: black;
    color: white;
    padding: 10px 20px;
    width:404px;
    display: flex;
    align-items: center;
    gap: 20px;
    position: sticky;
    top: 0;
    z-index:100;
}
/* Tombol toggle menu (hanya terlihat di mobile) */
#menu-toggle {
    background: none;
    border: none;
    color: white;
    font-size: 24px;
    cursor: pointer;
    /* Secara default, sembunyikan di desktop */
    display: block;  
}
.menu-malasngoding ul {
		list-style-type: none;
		margin: 0;
		padding: 0;
		overflow: hidden;  gap: 10px;
	}
	.menu-malasngoding > ul > li {
		float: left;
	    margin-left:40px;
	}
	.menu-malasngoding li a {
		display: inline-block;
		color: aqua;
		text-align: center;
		padding: 10px 10px;
		text-decoration: none;  gap: 10px;
	}
	.menu-malasngoding li a:hover{
		background-color: transparent;
    border: 1px solid violet;
    color: white;
	}
	li.dropdown {
		display: inline-block; gap: 10px;
	}
	.dropdown:hover .isi-dropdown {
		display: block;
	}
	.isi-dropdown a:hover {
		color: black !important;
	}
	.isi-dropdown {
		position: absolute;
		display: none;
		box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
		z-index: 300;
		background-color: transparent;
	}
	.isi-dropdown a {
		color: aqua!important;
	}
	.isi-dropdown a:hover {
		color: white !important;
		background: transparent !important;
	}
/* Wrapper Halaman */
.page-wrapper {
    display: flex;
}

.title{
     background-color: #555;
    color: white;
    padding: 15px;
    font-weight: bold;
    font-size: 1em;}
	
	.running-text {
  background: transparent;
  color: white;
  overflow: hidden;
  white-space: nowrap;
  padding: 12px 0;
  line-height: 1.2;
  font-size: 20px;
}

.running-text p {
  display: inline-block;
  color: white;
  animation: run 20s linear infinite;
}

.running-text p:hover {
  animation-play-state: paused;
}

@keyframes run {
  from {
    transform: translateX(50%);
  }
  to {
    transform: translateX(-100%);
  }
}
.foto{width:405px;height:600px;
margin-top:10px;}
</style>
<body>
    
    <!-- Header/Navigasi Utama -->
    <header>
        <h3>IEDUL FITRI 1447 H</h3>
        <div class="menu-malasngoding">
 <ul>
			<li class="dropdown"><a href="#">Sepatah Kata</a>
				<ul class="isi-dropdown">
					<li><a href="Permohonan.html">Permohonan</a></li>
					<li><a href="Harapan.html">Harapan</a></li>
				</ul>
			</li>
    </header>
        <!-- Konten Utama -->
        <main>
             <div class="running-text">
        <p>Kami (Irwan Wahyudi dan Keluarga) Mengucapkan Selamat Hari Raya Iedul Fitri 1447 H - Mohon dimaafkan Lahir dan Batin -جَعَلَنَا اللهُ وَإِيَّاكُمْ مِنَ الْعَائِدِيْنَ وَالْفَائِزِيْنَ</p>
        </div>
			<img src="fitri.jpg" class="foto">
    </div>
</body>
<script>
   document.addEventListener('DOMContentLoaded', () => {
    const menuToggle = document.getElementById('menu-toggle');
    const sidebar = document.getElementById('sidebar');

    menuToggle.addEventListener('click', () => {
        // Toggle class 'active' saat tombol diklik
        sidebar.classList.toggle('active');
    });
});     
</script>
</html>
